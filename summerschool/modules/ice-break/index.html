<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新人村破冰任务图</title>
    <link rel="preload" as="image" href="./assets/dice/bg.webp" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="viewport">
      <section id="stage" class="stage" aria-label="新人村破冰任务图">
        <img
          class="task-map"
          src="./assets/icebreaking.webp"
          alt="新人村破冰任务图，包含六项破冰交流任务"
          draggable="false"
        />

        <div id="diceLayer" class="dice-layer" aria-hidden="true" hidden>
          <div class="dice-spinner">
            <div class="dice-aura" aria-hidden="true"></div>
            <div class="dice-rotator">
              <img
                id="diceImage"
                class="dice-image"
                src="./assets/dice/Rectangle1.webp"
                alt="骰子结果：1"
                draggable="false"
              />
            </div>
          </div>
        </div>

        <button id="fullscreenButton" class="fullscreen-button" type="button">
          <svg class="fullscreen-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5" />
          </svg>
          <span id="fullscreenLabel">全屏</span>
        </button>

        <p id="statusMessage" class="visually-hidden" aria-live="polite">
          骰子已隐藏
        </p>
      </section>
    </main>

    <script type="module" src="./js/app.js?v=2"></script>
    <script type="module" src="./js/embed-bridge.js"></script>
  </body>
</html>
