<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通识基础模块 · 课程表（第26页形式预览）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --curriculum-sidebar-bg: #000000;
      --curriculum-sidebar-text: #ffffff;
      --curriculum-content-bg: #f2c4ae;
      --curriculum-content-text: #000000;
      --curriculum-divider: #000000;
      --curriculum-module-col: 220px;
      --curriculum-hours-col: 64px;
      --curriculum-sidebar-col: 72px;
      --curriculum-font: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: var(--curriculum-font);
      padding: 24px;
    }

    .curriculum-canvas {
      width: 1200px;
      max-width: 100%;
      background: var(--curriculum-content-bg);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    .curriculum-matrix {
      display: grid;
      grid-template-columns: var(--curriculum-sidebar-col) 1fr;
      min-height: 820px;
    }

    .curriculum-sidebar {
      background: var(--curriculum-sidebar-bg);
      color: var(--curriculum-sidebar-text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 8px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.12em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    .curriculum-body {
      display: flex;
      flex-direction: column;
    }

    .curriculum-block {
      display: grid;
      grid-template-columns: var(--curriculum-module-col) 1fr var(--curriculum-hours-col);
      border-bottom: 1px solid var(--curriculum-divider);
    }

    .curriculum-block:last-child {
      border-bottom: none;
    }

    .curriculum-module {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--curriculum-content-text);
      border-right: 1px solid var(--curriculum-divider);
    }

    .curriculum-topics {
      display: flex;
      flex-direction: column;
    }

    .curriculum-row {
      display: grid;
      grid-template-columns: 1fr var(--curriculum-hours-col);
      border-bottom: 1px solid var(--curriculum-divider);
      min-height: 44px;
    }

    .curriculum-row:last-child {
      border-bottom: none;
    }

    .curriculum-topic {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 400;
      color: var(--curriculum-content-text);
      line-height: 1.35;
    }

    .curriculum-hours {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--curriculum-content-text);
      border-left: 1px solid var(--curriculum-divider);
    }

    .curriculum-block--section-hours .curriculum-module {
      grid-row: 1 / -1;
    }

    .curriculum-block--section-hours .curriculum-hours--block {
      grid-row: 1 / -1;
      border-left: 1px solid var(--curriculum-divider);
    }

    .curriculum-block--section-hours .curriculum-topics .curriculum-row {
      grid-template-columns: 1fr;
    }

    .curriculum-block--section-hours .curriculum-topics .curriculum-row .curriculum-hours {
      display: none;
    }

    .curriculum-block--single-row .curriculum-topics {
      min-height: 52px;
    }

    .curriculum-block--single-row .curriculum-topic {
      font-weight: 600;
    }

    .curriculum-caption {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      text-align: center;
      max-width: 1200px;
    }
  </style>
</head>
<body>
  <div>
    <div class="curriculum-canvas" role="img" aria-label="通识基础模块课程表">
      <div class="curriculum-matrix">
        <aside class="curriculum-sidebar">通识基础模块</aside>
        <div class="curriculum-body" id="curriculum-body"></div>
      </div>
    </div>
    <p class="curriculum-caption">宣传册第26页形式 · 无图片/水印 · 供 Figma 对照（docs/guides/design-curriculum-foundation.md）</p>
  </div>
  <script>
    const BLOCKS = [
      {
        module: 'Design Foundation 1',
        hoursMode: 'section',
        hours: '10H',
        topics: [
          'Defining Game 定义游戏',
          'Game Structure 游戏结构',
          'Board Game 桌上游戏',
          'Digital Game 数字游戏',
          'Conceptualization & Prototyping 概念与原型'
        ]
      },
      {
        module: 'Design Foundation 2',
        hoursMode: 'section',
        hours: '10H',
        topics: [
          'Rules & Mechanics 规则与机制',
          'Interface & User experience 界面与用户体验',
          'Level Design 关卡设计',
          'World, Story & Character 世界, 故事与角色',
          'Document & Proposal 游戏设计文档'
        ]
      },
      {
        module: 'Design Foundation 3',
        hoursMode: 'row',
        hours: '10H',
        topics: [
          'Practice: 桌游改造',
          'Practice: 关卡概念',
          'Practice: UI 设计',
          'Practice: 3D道具设计',
          'Practice: 像素游戏美术'
        ]
      },
      {
        module: 'Design Foundation 4',
        hoursMode: 'row',
        hours: '10H',
        topics: [
          'Miniproject: GDD',
          'Miniproject: 关卡实现',
          'Miniproject: 桌游设计',
          'Miniproject: 3D环境美术',
          'Miniproject: 游戏开发入门'
        ]
      },
      {
        module: 'AI课程',
        hoursMode: 'row',
        hours: '10H',
        topics: ['\u00a0'],
        single: true
      },
      {
        module: '软件课程 LEVEL 1',
        hoursMode: 'row',
        hours: '20H',
        topics: ['数字绘画', '3D建模', '数字雕刻', '灯光渲染']
      },
      {
        module: '软件课程 LEVEL 2',
        hoursMode: 'row',
        hours: '20H',
        topics: ['2D动画合成', 'PBR全流程掌握', '电脑动画']
      },
      {
        module: '软件课程 LEVEL 3',
        hoursMode: 'row',
        hours: '20H',
        topics: ['虚幻引擎入门', 'Unity游戏开发基础', 'AIGC', 'TA游戏特效']
      }
    ];

    const body = document.getElementById('curriculum-body');

    BLOCKS.forEach((block) => {
      const section = document.createElement('section');
      const isSectionHours = block.hoursMode === 'section';
      section.className = 'curriculum-block' + (isSectionHours ? ' curriculum-block--section-hours' : '') + (block.single ? ' curriculum-block--single-row' : '');

      const mod = document.createElement('div');
      mod.className = 'curriculum-module';
      mod.textContent = block.module;
      section.appendChild(mod);

      const topics = document.createElement('div');
      topics.className = 'curriculum-topics';

      if (block.single) {
        block.topics.forEach((text) => {
          const row = document.createElement('div');
          row.className = 'curriculum-row';
          const topic = document.createElement('div');
          topic.className = 'curriculum-topic';
          topic.textContent = text;
          row.appendChild(topic);
          const h = document.createElement('div');
          h.className = 'curriculum-hours';
          h.textContent = block.hours;
          row.appendChild(h);
          topics.appendChild(row);
        });
      } else {
        block.topics.forEach((text) => {
          const row = document.createElement('div');
          row.className = 'curriculum-row';
          const topic = document.createElement('div');
          topic.className = 'curriculum-topic';
          topic.textContent = text;
          row.appendChild(topic);
          if (!isSectionHours) {
            const h = document.createElement('div');
            h.className = 'curriculum-hours';
            h.textContent = block.hours;
            row.appendChild(h);
          }
          topics.appendChild(row);
        });
      }

      section.appendChild(topics);

      if (isSectionHours) {
        const hBlock = document.createElement('div');
        hBlock.className = 'curriculum-hours curriculum-hours--block';
        hBlock.textContent = block.hours;
        section.appendChild(hBlock);
      }

      body.appendChild(section);
    });
  </script>
</body>
</html>
