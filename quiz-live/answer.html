<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <meta name="theme-color" content="#0a0a0c">

    <title>趣味常识挑战 · 答题</title>

    <link rel="stylesheet" href="css/quiz-live.css">

</head>

<body>

    <div class="ql-app" data-quiz-answer>

        <div class="ql-broadcast" data-broadcast>

            <span class="ql-broadcast-label">广播</span>

            <div class="ql-broadcast-viewport">

                <span class="ql-broadcast-track ql-broadcast-idle" data-broadcast-track>等待战场广播…</span>

            </div>

        </div>

        <div class="ql-reconnect-banner ql-hidden" data-reconnect-banner role="status">连接已断开，正在重连…</div>

        <header class="ql-header">

            <span class="ql-badge" data-participant-id>未登记</span>

            <h1 data-quiz-title>趣味常识挑战</h1>

            <p>

                <span class="ql-status-dot" data-status-dot></span>

                <span data-status-text>连接中…</span>

            </p>

        </header>



        <main class="ql-main">

            <!-- 1 登记昵称 -->

            <section class="ql-panel" data-view="register">

                <h2 data-register-title style="margin:0 0 16px;font-size:1.1rem;">扫码加入 · 输入昵称</h2>

                <form data-register-form>

                    <div data-register-fields></div>

                    <button type="submit" class="ql-btn" data-register-submit>进入答题</button>

                    <button type="button" class="ql-btn ql-btn--ghost ql-hidden" data-continue-btn style="margin-top:10px;">以昵称继续</button>

                </form>

            </section>



            <!-- 2 选择类别 -->

            <section class="ql-panel ql-hidden" data-view="category">

                <h2 style="margin:0 0 20px;font-size:1.1rem;">选择挑战类别</h2>

                <div class="ql-category-grid" data-category-grid></div>

                <button type="button" class="ql-btn ql-category-leaderboard-btn" data-leaderboard-open style="margin-top:16px;">排行榜</button>

            </section>



            <!-- 2b 排行榜 -->

            <section class="ql-panel ql-hidden" data-view="leaderboard">

                <h2 style="margin:0 0 12px;font-size:1.1rem;">排行榜</h2>

                <p class="ql-leaderboard-meta">在线 <strong data-leaderboard-online>0</strong> 人</p>

                <div class="ql-leaderboard-scroll">

                    <table class="ql-score-table ql-leaderboard-table">

                        <thead>

                            <tr>

                                <th>编号</th>

                                <th>昵称</th>

                                <th>得分</th>

                                <th>当前连胜</th>

                                <th>最高连胜</th>

                                <th>状态</th>

                            </tr>

                        </thead>

                        <tbody data-leaderboard-body>

                            <tr><td colspan="6">加载中…</td></tr>

                        </tbody>

                    </table>

                </div>

                <button type="button" class="ql-btn ql-btn--ghost" data-leaderboard-back style="margin-top:16px;">返回选题</button>

            </section>



            <!-- 3 答题 -->
            <section class="ql-panel ql-hidden" data-view="quiz">
                <div class="ql-quiz-progress">
                    <div class="ql-quiz-progress-head">
                        <span class="ql-quiz-progress-label">答题进度</span>
                    </div>
                    <div class="ql-quiz-progress-track">
                        <div class="ql-quiz-progress-fill" data-progress-fill style="width:0%"></div>
                    </div>
                </div>
                <p class="ql-question-text" data-question-text></p>

                <div class="ql-options" data-options></div>
                <button type="button" class="ql-btn" data-confirm-btn disabled style="margin-top:16px;">确定</button>
                <div class="ql-feedback ql-hidden" data-feedback></div>
                <button type="button" class="ql-btn ql-btn--ghost ql-hidden" data-next-btn style="margin-top:10px;">下一题</button>

            </section>

        </main>

        <button type="button" class="ql-float-back ql-hidden" data-float-back aria-label="返回重选题目">返回</button>

    </div>



    <script src="scripts/quiz-protocol.js"></script>

    <script src="scripts/quiz-register-config.js"></script>

    <script src="scripts/quiz-broadcast.js"></script>

    <script src="scripts/quiz-ws-client.js"></script>

    <script src="scripts/quiz-answer-ws.js?v=2"></script>
    <script src="scripts/quiz-answer-ui.js?v=2"></script>
    <script src="scripts/quiz-answer.js?v=3"></script>

</body>

</html>
