<!DOCTYPE html>

<html lang="zh-CN" class="ql-answer-page">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <meta name="theme-color" content="#0a0a0c">

    <title>趣味常识挑战 · 答题</title>

    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">

    <link rel="stylesheet" href="css/quiz-live.css?v=12">

</head>

<body>

    <div class="ql-orientation-lock ql-hidden" data-orientation-lock role="dialog" aria-modal="true" aria-label="请旋转至竖屏" aria-hidden="true">
        <div class="ql-orientation-lock-card">
            <div class="ql-orientation-lock-icon" aria-hidden="true"></div>
            <p class="ql-orientation-lock-title">请旋转手机</p>
            <p class="ql-orientation-lock-msg">答题界面仅支持竖屏浏览</p>
        </div>
    </div>

    <div class="ql-app" data-quiz-answer>

        <div class="ql-broadcast is-idle" data-broadcast>

            <span class="ql-broadcast-label">广播</span>

            <div class="ql-broadcast-viewport">

                <div class="ql-broadcast-idle-fx" aria-hidden="true">
                    <span class="ql-broadcast-echo"></span>
                    <span class="ql-broadcast-echo"></span>
                    <span class="ql-broadcast-echo"></span>
                </div>

                <span class="ql-broadcast-track ql-broadcast-idle" data-broadcast-track></span>

            </div>

        </div>

        <div class="ql-reconnect-banner ql-hidden" data-reconnect-banner role="status">连接已断开，正在重连…</div>

        <header class="ql-header">

            <div class="ql-user-bar">

                <span class="ql-badge" data-participant-id>未登记</span>

                <div class="ql-header-slot" data-quiz-title hidden></div>

                <span class="ql-conn-icon is-connecting" data-conn-icon role="status" aria-label="连接中">

                    <svg class="ql-conn-icon-svg" viewBox="0 0 20 16" width="14" height="11" aria-hidden="true">

                        <rect class="ql-conn-bar ql-conn-bar--1" x="1" y="11" width="3" height="4" rx="0.5"></rect>

                        <rect class="ql-conn-bar ql-conn-bar--2" x="6" y="8" width="3" height="7" rx="0.5"></rect>

                        <rect class="ql-conn-bar ql-conn-bar--3" x="11" y="5" width="3" height="10" rx="0.5"></rect>

                        <rect class="ql-conn-bar ql-conn-bar--4" x="16" y="2" width="3" height="13" rx="0.5"></rect>

                    </svg>

                </span>

            </div>

        </header>



        <main class="ql-main">

            <!-- 1 登记昵称 -->

            <section class="ql-panel" data-view="register">

                <h2 data-register-title style="margin:0 0 16px;font-size:1.1rem;">扫码加入 · 输入昵称</h2>

                <form data-register-form>

                    <div data-register-fields></div>

                    <button type="submit" class="ql-btn" data-register-submit>进入答题</button>

                    <button type="button" class="ql-btn ql-btn--ghost ql-hidden" data-continue-btn style="margin-top:10px;">以昵称继续</button>

                </form>

            </section>



            <!-- 2 选择类别 -->

            <div class="ql-category-screen ql-hidden" data-view="category">

                <section class="ql-panel ql-category-panel">

                    <h2 class="ql-category-heading">选择挑战类别</h2>

                    <div class="ql-category-grid" data-category-grid></div>

                </section>

                <button type="button" class="ql-btn ql-btn--ghost ql-category-leaderboard-btn" data-leaderboard-open>总排行榜</button>

            </div>



            <!-- 2a 挑战准备 -->

            <div class="ql-prepare-screen ql-hidden" data-view="prepare">

                <section class="ql-panel ql-prepare-panel">

                    <div class="ql-prepare-body">

                        <h2 class="ql-prepare-category" data-prepare-category></h2>

                        <p class="ql-prepare-msg">即将开始连续10题挑战，准备好了吗？</p>

                    </div>

                    <button type="button" class="ql-btn" data-prepare-start>开始挑战</button>

                </section>

                <div class="ql-prepare-footer">

                    <button type="button" class="ql-btn ql-btn--ghost ql-prepare-leaderboard-btn" data-category-leaderboard-open>排行榜</button>

                    <button type="button" class="ql-btn ql-btn--ghost" data-prepare-back>返回选题</button>

                </div>

            </div>



            <!-- 2b 排行榜 -->

            <div class="ql-leaderboard-screen ql-hidden" data-view="leaderboard">

                <section class="ql-panel ql-leaderboard-frame">

                    <h2 class="ql-leaderboard-heading" data-leaderboard-title>排行榜</h2>

                    <div class="ql-leaderboard-scroll">

                        <table class="ql-score-table ql-leaderboard-table">

                            <thead data-leaderboard-head>

                                <tr>

                                    <th>昵称</th>

                                    <th>得分</th>

                                    <th>当前连胜</th>

                                    <th>最高连胜</th>

                                    <th>状态</th>

                                </tr>

                            </thead>

                            <tbody data-leaderboard-body>

                                <tr><td colspan="5">加载中…</td></tr>

                            </tbody>

                        </table>

                    </div>

                </section>

                <button type="button" class="ql-btn ql-btn--ghost ql-leaderboard-back-btn" data-leaderboard-back>返回选题</button>

            </div>



            <!-- 3 答题 -->
            <section class="ql-panel ql-quiz-panel ql-hidden" data-view="quiz">
                <div class="ql-quiz-top">
                    <div class="ql-quiz-progress">
                        <div class="ql-quiz-progress-head">
                            <span class="ql-quiz-progress-label">答题进度</span>
                        </div>
                        <div class="ql-quiz-progress-bar">
                            <div class="ql-quiz-progress-markers" data-progress-markers aria-hidden="true"></div>
                            <div class="ql-quiz-progress-track">
                                <div class="ql-quiz-progress-fill" data-progress-fill style="width:0%"></div>
                            </div>
                        </div>
                    </div>
                    <p class="ql-question-text" data-question-text></p>
                    <div class="ql-feedback ql-hidden" data-feedback></div>
                </div>
                <div class="ql-quiz-bottom">
                    <div class="ql-options" data-options></div>
                    <button type="button" class="ql-btn" data-confirm-btn disabled>确定</button>
                    <button type="button" class="ql-btn ql-btn--ghost ql-hidden" data-next-btn>下一题</button>
                </div>
            </section>

        </main>

        <button type="button" class="ql-float-back ql-hidden" data-float-back aria-label="返回重选题目">返回</button>

        <div class="ql-bank-loading ql-hidden" data-bank-loading aria-hidden="true" role="dialog" aria-label="题库加载中" aria-modal="true">
            <div class="ql-bank-loading-card">
                <div class="ql-bank-loading-spinner" aria-hidden="true"></div>
                <p class="ql-bank-loading-title">正在加载题库…</p>
                <div class="ql-bank-loading-track">
                    <div class="ql-bank-loading-fill" data-bank-loading-fill style="width:0%"></div>
                </div>
                <p class="ql-bank-loading-pct" data-bank-loading-pct>0%</p>
            </div>
        </div>

        <div class="ql-round-summary ql-hidden" data-round-summary aria-hidden="true" role="dialog" aria-label="本轮成绩" aria-modal="true">
            <div class="ql-round-summary-card">
                <h2 class="ql-round-summary-title">本轮成绩</h2>
                <p class="ql-round-summary-main" data-round-summary-score>回答正确 0/10</p>
                <ul class="ql-round-summary-stats">
                    <li>累计正确答题 <strong data-round-total-correct>0</strong> 题</li>
                    <li>本次获得经验 <strong data-round-exp-gained>+0</strong></li>
                    <li>总经验值 <strong data-round-total-exp>0</strong></li>
                </ul>
                <p class="ql-round-summary-accuracy" data-round-category-accuracy></p>
                <button type="button" class="ql-btn ql-round-summary-confirm" data-round-summary-close>确定</button>
            </div>
        </div>

        <div class="ql-toast ql-hidden" data-toast role="status" aria-live="polite"></div>

    </div>



    <script src="scripts/quiz-answer-portrait.js?v=1"></script>
    <script src="scripts/quiz-protocol.js"></script>

    <script src="scripts/quiz-register-config.js"></script>

    <script src="scripts/quiz-broadcast.js?v=3"></script>

    <script src="scripts/quiz-ws-client.js"></script>

    <script src="scripts/quiz-answer-questions.js?v=1"></script>
    <script src="scripts/quiz-answer-ws.js?v=7"></script>
    <script src="scripts/quiz-answer-ui.js?v=13"></script>
    <script src="scripts/quiz-answer.js?v=8"></script>

</body>

</html>
