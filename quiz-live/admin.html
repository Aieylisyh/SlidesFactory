<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>趣味常识挑战 · 主持控台</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/quiz-live.css">
</head>
<body>
    <div class="ql-admin-layout" data-quiz-admin>
        <aside class="ql-admin-sidebar">
            <div class="ql-panel">
                <h2 style="margin:0;font-size:1rem;">房间码</h2>
                <div class="ql-room-code" data-room-code>------</div>
                <div class="ql-qr-wrap"><canvas data-qr-canvas width="180" height="180" aria-label="观众扫码入口"></canvas></div>
                <p class="ql-qr-warn ql-hidden" data-qr-warn style="margin:8px 0 0;font-size:0.78rem;color:var(--ql-warn);"></p>
                <p style="margin:0;font-size:0.78rem;color:var(--ql-muted);word-break:break-all;" data-answer-url></p>

                <div class="ql-admin-actions">
                    <button type="button" class="ql-btn ql-btn--sm ql-btn--ghost" data-admin-action="clear_all_data">清除全部数据</button>
                </div>

                <div class="ql-admin-vip">
                    <h3 class="ql-admin-vip-title">VIP 参赛分享</h3>
                    <p class="ql-admin-vip-desc">生成单次有效链接，首位完成登记的用户永久解锁指定题库。</p>
                    <label class="ql-admin-vip-field">
                        <span>题库</span>
                        <select class="ql-input" data-vip-category>
                            <option value="">加载中…</option>
                        </select>
                    </label>
                    <button type="button" class="ql-btn ql-btn--sm" data-vip-generate>生成分享链接</button>
                    <label class="ql-admin-vip-field">
                        <span>链接</span>
                        <input type="text" class="ql-input" data-vip-link readonly placeholder="生成后显示在此">
                    </label>
                    <button type="button" class="ql-btn ql-btn--sm ql-btn--ghost" data-vip-copy disabled>复制链接</button>
                    <ul class="ql-admin-vip-list" data-vip-list>
                        <li class="ql-admin-vip-list-empty">暂无分享记录</li>
                    </ul>
                </div>
            </div>
        </aside>

        <main>
            <div class="ql-panel ql-admin-stats">
                <p class="ql-admin-online">在线 <strong data-online-count>0</strong> 人</p>
                <h3 style="margin:16px 0 8px;font-size:0.95rem;">最近广播</h3>
                <ul class="ql-admin-broadcasts" data-recent-broadcasts>
                    <li class="ql-admin-broadcasts-empty">暂无广播</li>
                </ul>
            </div>
            <div class="ql-panel">
                <div class="ql-admin-users" data-user-manager>
                    <div class="ql-admin-users-head">
                        <h3 style="margin:0;">用户管理</h3>
                        <p class="ql-admin-user-stats" data-user-stats>共 0 人 · 在线 0 人</p>
                    </div>
                    <div class="ql-admin-users-toolbar">
                        <input type="search" class="ql-input" data-user-search placeholder="搜索昵称（支持正则）" autocomplete="off">
                        <button type="button" class="ql-btn ql-btn--sm" data-fetch-users>刷新数据</button>
                    </div>
                    <div class="ql-admin-user-list" data-user-list>
                        <p class="ql-admin-users-empty">点击「刷新数据」加载用户列表</p>
                    </div>
                    <div class="ql-admin-pagination">
                        <button type="button" class="ql-btn ql-btn--sm ql-btn--ghost" data-page-prev disabled>上一页</button>
                        <span class="ql-admin-page-info" data-page-info>—</span>
                        <button type="button" class="ql-btn ql-btn--sm ql-btn--ghost" data-page-next disabled>下一页</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../remoteNavigator/scripts/vendor/qrcode.min.js"></script>
    <script src="scripts/quiz-protocol.js"></script>
    <script src="scripts/quiz-ws-client.js"></script>
    <script src="scripts/quiz-admin.js"></script>
</body>
</html>
